<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skills Palette — panel button icon options</title>
<style>
  body { margin: 0; font-family: -apple-system, Segoe UI, system-ui, sans-serif; }
  .panes { display: flex; }
  .pane { flex: 1; padding: 28px 24px; }
  .dark { background: #1e1e1e; color: #ccc; }
  .light { background: #f3f3f3; color: #333; }
  h1 { font-size: 15px; font-weight: 600; opacity: .7; margin: 0 0 18px; }
  .row { display: flex; align-items: center; gap: 26px; padding: 14px 0; border-bottom: 1px solid rgba(128,128,128,.18); }
  .num { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-size: 13px; font-weight: 700; background: rgba(110,168,254,.18); color: #6ea8fe; flex: none; }
  .name { width: 92px; font-size: 12px; opacity: .65; flex: none; }
  /* 18px = the real footer-button size */
  .btn18 { width: 18px; height: 18px; color: #8a8a8a; }
  .btn18:hover, .row:hover .btn18 { color: #6ea8fe; }
  .big { width: 40px; height: 40px; color: currentColor; }
  svg { display: block; }
  .label18 { font-size: 10px; opacity: .45; margin-left: -16px; }
  .footerdemo { margin-top: 26px; display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border-radius: 8px; background: rgba(128,128,128,.12); }
  .footerdemo svg { width: 18px; height: 18px; color: #8a8a8a; }
  .cap { font-size: 11px; opacity: .5; margin-top: 6px; }
</style>
</head>
<body>
<div class="panes">
  <!-- repeated for dark + light -->
  <div class="pane dark">
    <h1>Dark theme (18px = real button size, hover = blue)</h1>
    <div id="rows-dark"></div>
    <div class="cap">Footer mock (how it sits in #orb-tools):</div>
    <div class="footerdemo" id="demo-dark"></div>
  </div>
  <div class="pane light">
    <h1>Light theme</h1>
    <div id="rows-light"></div>
    <div class="cap">Footer mock:</div>
    <div class="footerdemo" id="demo-light"></div>
  </div>
</div>

<script>
const icons = [
  { name: 'Checklist', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/></svg>' },
  { name: 'Grid / apps', svg: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.6"/></svg>' },
  { name: 'Layers', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>' },
  { name: 'Puzzle', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.44 7.85c-.05.32.06.65.29.88l1.57 1.57c.47.47.7 1.09.7 1.7s-.23 1.24-.7 1.71l-1.61 1.61a.98.98 0 0 1-.84.28c-.47-.07-.8-.48-.97-.93a2.5 2.5 0 1 0-3.21 3.22c.45.17.85.5.92.97a.98.98 0 0 1-.27.84l-1.61 1.61a2.4 2.4 0 0 1-1.71.7 2.4 2.4 0 0 1-1.7-.7l-1.57-1.57a1.03 1.03 0 0 0-.88-.29c-.49.07-.84.5-1.02.97a2.5 2.5 0 1 1-3.24-3.24c.46-.18.9-.53.97-1.02a1.03 1.03 0 0 0-.29-.88l-1.57-1.57A2.4 2.4 0 0 1 2 12c0-.62.24-1.23.71-1.7l1.52-1.53c.24-.24.58-.35.92-.3.51.08.87.53 1.07 1.01a2.5 2.5 0 1 0 3.26-3.26c-.48-.2-.93-.56-1.01-1.07a1.03 1.03 0 0 1 .3-.92l1.53-1.52A2.4 2.4 0 0 1 12 2c.62 0 1.23.24 1.7.71l1.57 1.57c.23.23.56.34.88.29.49-.08.84-.5 1.02-.97a2.5 2.5 0 1 1 3.24 3.24c-.46.18-.9.53-.97 1.01z"/></svg>' },
  { name: 'Plug / link', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></svg>' },
];

function build(rowsId, demoId) {
  const rows = document.getElementById(rowsId);
  const demo = document.getElementById(demoId);
  icons.forEach((ic, i) => {
    const row = document.createElement('div'); row.className = 'row';
    row.innerHTML =
      '<div class="num">' + (i + 1) + '</div>' +
      '<div class="name">' + ic.name + '</div>' +
      '<span class="btn18">' + ic.svg + '</span>' +
      '<span class="label18">18px</span>' +
      '<span class="big">' + ic.svg + '</span>';
    rows.appendChild(row);
    const d = document.createElement('span'); d.innerHTML = ic.svg; d.title = (i + 1) + '. ' + ic.name;
    demo.appendChild(d);
  });
}
build('rows-dark', 'demo-dark');
build('rows-light', 'demo-light');
</script>
</body>
</html>
